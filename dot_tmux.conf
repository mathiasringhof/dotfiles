# Prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix
set -g repeat-time 300

# Reload config
bind q source-file ~/.tmux.conf \; display-message "tmux reloaded"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane controls
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #W? (y/n)" kill-window

# AeroSpace-style pane navigation and movement
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r H swap-pane -d -s '{left-of}'
bind -r J swap-pane -d -s '{down-of}'
bind -r K swap-pane -d -s '{up-of}'
bind -r L swap-pane -d -s '{right-of}'
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind Tab last-window
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind Q confirm-before -p "Kill session #S? (y/n)" kill-session
bind P switch-client -p
bind N switch-client -n

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -g set-titles on
# set -g set-titles-string 'tmux #{client_tty} #S:#I'
set-option -g set-titles-string "#W #{client_tty}"

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[bg=default] "
set -g status-right "#[fg=#7aa2f7]#{?client_prefix,PREFIX ,}#[fg=#565f89]#h "
set -g window-status-format "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=default,fg=#7aa2f7"
set -g message-command-style "bg=default,fg=#7aa2f7"
set -g mode-style "bg=#7aa2f7,fg=#1a1b26"
setw -g clock-mode-colour "#7aa2f7"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '/opt/homebrew/opt/tpm/share/tpm/tpm'
